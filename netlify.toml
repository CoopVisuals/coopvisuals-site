[build]
  publish = "coopvisuals-site"

[[headers]]
  for = "/*"
  [headers.values]

    # HSTS — forces HTTPS for 2 years; includeSubDomains covers listings.coopvisuals.com
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Clickjacking protection (X-Frame-Options for older browsers, frame-ancestors in CSP for modern)
    X-Frame-Options = "DENY"

    # MIME sniffing prevention
    X-Content-Type-Options = "nosniff"

    # Full URL on same-origin; only origin sent to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features the site doesn't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # CSP — fixed for GA4 inline scripts and analytics data collection
    # script-src includes 'unsafe-inline' + GTM for the GA4 snippet
    # connect-src includes GA domains for analytics data transmission
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

    # Legacy XSS header — set to 0 per OWASP (old browser filter can introduce vulnerabilities)
    X-XSS-Protection = "0"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
